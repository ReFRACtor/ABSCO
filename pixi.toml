[workspace]
name = "absco"
version = "0.1.0"
description = "Absorption coefficient (ABSCO) table generation using LBLRTM and LNFL"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10"
numpy = ">=1.24"
scipy = ">=1.10"
pandas = ">=2.0"
netcdf4 = ">=1.6"
xarray = ">=2023.1"
platformdirs = ">=3"
pip = "*"
# Fortran toolchain for building LBLRTM/LNFL (absco-build)
gfortran = "*"
make = "*"

[pypi-dependencies]
zenodo-get = ">=1.3"
absco = { path = ".", editable = true }

[tasks]
# see docs/packaging_plan.md item 7 for the full task set (build-fortran, init, ...)
config = "absco-config"
generate = "absco-generate"
