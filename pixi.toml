[workspace]
name = "absco"
version = "0.1.0"
description = "Absorption coefficient (ABSCO) table generation using LBLRTM and LNFL"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
python = ">=3.10"
numpy = ">=1.24"
scipy = ">=1.10"
pandas = ">=2.0"
netcdf4 = ">=1.6"
xarray = ">=2023.1"
platformdirs = ">=3"
pip = "*"
# Fortran toolchain for building LBLRTM/LNFL (absco-build).
make = "*"
# LBLRTM v12.17 unconditionally builds its netCDF read module, so the Fortran
# netCDF headers/libs (netcdf.inc, libnetcdff) are required even for non-netCDF runs.
netcdf-fortran = "*"

# gfortran is pinned to 11.2.0 on linux-64: LBLRTM v12.17 / LNFL master are legacy
# AER code, and 11.2.0 is the known-good build compiler (see docs/packaging_plan.md
# item 4). conda-forge only ships that exact build for linux-64/osx-64; other
# platforms get the latest gfortran.
[target.linux-64.dependencies]
gfortran = "==11.2.0"

[target.osx-64.dependencies]
gfortran = ">=11,<13"

[target.osx-arm64.dependencies]
gfortran = ">=11,<13"

[pypi-dependencies]
zenodo-get = ">=1.3"
absco = { path = ".", editable = true }

[tasks]
# see docs/packaging_plan.md item 7 for the full task set (build-fortran, init, ...)
# LNFL/LBLRTM carry nested submodules (aer_rt_utils, cross-sections); init recursively.
submodules = "git submodule update --init --recursive"
build-fortran = { cmd = "absco-build", depends-on = ["submodules"] }
config = "absco-config"
generate = "absco-generate"
