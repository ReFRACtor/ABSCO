[data files]
; 80-character header that will be placed in each final OD file
; (on the coarse grid)
header = LBLRTM v12.9 AER 3.6

; Data files below are resolved from the installed package by default when left
; blank.  Set an absolute path only to override with a custom file.

; text file with 1 pressure layer [mbar] per line
pfile =

; text file with pressure layers and associated layer-average temperatures [K]
ptfile =

; CSV files with interpolated/extrapolated VMRs for the entire profile
vmrfile =
hdofile =

; species names for which XS and line parameters both exist and line parameter
; usage is recommended by HITRAN
xs_lines =

; channels for which LBL will be run. space delimited
; should be equal number of substrings for each variable
; for now, resolution is always in cm-1
[channels]
wn1 =
wn2 =
lblres =
outres =

; units should either be cm-1 (wavenumbers), um (microns), or nm (nanometers)
units = cm-1

; water vapor [ppmv] used for all levels in a given profile (for H2O, CO2, and
; N2, since their continua depend on water vapor amounts)
[vmr]
wv_vmr = 1.0e1 4.0e4

; HITRAN molecule names, space delimited, case-insensitive
[molecules]
molnames =

[makeTAPE5]
; multiplicative factors used for the continuum scaling
scale = 1.0

; Directory relative to the working directory to which TAPE5 files will be
; written (created underneath both lnfl_run_dir and lbl_run_dir)
tape5_dir = TAPE5_dir

[runLNFL]
; Directory (under the working directory) where LNFL runs will occur.
lnfl_run_dir = LNFL_Runs

; Paths below are resolved from the ABSCO data directory (see `absco-init`) when
; left blank.  Set absolute paths only to override.

; full TAPE1 ASCII line file used in LNFL runs (for HDO, 01_h2o_162_only)
tape1_path =

; full TAPE2 ASCII line coupling file used in LNFL runs with O2, CO2, and CH4
tape2_path =

; LNFL executable
lnfl_path =

; broadening and speed dependence parameter directory
extra_params =

; directory for LNFL output (binary line files)
tape3_dir = TAPE3_dir

[runLBL]
; LBLRTM executable
lbl_path =

; cross section file directory
xs_path =

; cross section "lookup" file
fscdxs =

; Directory (under the working directory) where LBL runs will occur.
lbl_run_dir = LBL_Runs

[output]
; top-level directory for all output (intermediate and final); "." means the
; current working directory
intdir = .

; directory where the netCDFs will reside
outdir = nc_ABSCO

; software version
sw_ver = 0.0

; user description for run, used in output file name (no spaces!)
out_file_desc = init

; compression level (4 is default in netCDF4 package)
nc_compress = 4

; chunk size for frequency dimension of the cross section dataset
freq_chunk = 5000
